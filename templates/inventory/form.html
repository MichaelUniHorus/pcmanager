{% extends 'base.html' %}

{% block content %}
<h2>{{ title }}</h2>

<div class="mb-3">
    <div class="btn-group" role="group">
        <a href="?type=component" class="btn {% if entry_type != 'assembled' %}btn-primary{% else %}btn-outline-primary{% endif %}">Комплектующее</a>
        <a href="?type=assembled" class="btn {% if entry_type == 'assembled' %}btn-primary{% else %}btn-outline-primary{% endif %}">Готовый ПК</a>
    </div>
</div>

<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label for="{{ form.category.id_for_label }}" class="form-label">Категория</label>
        {{ form.category }}
    </div>
    <div class="mb-3">
        <label for="{{ form.name.id_for_label }}" class="form-label">Название</label>
        {{ form.name }}
    </div>
    <div class="mb-3">
        <label for="{{ form.specs.id_for_label }}" class="form-label">Характеристики</label>
        {{ form.specs }}
    </div>
    <div class="mb-3">
        <label for="{{ form.purchase_price.id_for_label }}" class="form-label">Цена закупки</label>
        {{ form.purchase_price }}
    </div>
    <div class="mb-3">
        <label for="{{ form.quantity.id_for_label }}" class="form-label">Количество</label>
        {{ form.quantity }}
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="{% url 'component_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
