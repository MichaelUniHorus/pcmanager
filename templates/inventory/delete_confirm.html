{% extends 'base.html' %}

{% block content %}
<h2>Удалить комплектующее</h2>

<div class="alert alert-warning">
    <p>Вы уверены, что хотите удалить <strong>{{ component.name }}</strong>?</p>
    <p class="mb-0">Это действие также удалит комплектующее из всех сборок ПК.</p>
</div>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Удалить</button>
    <a href="{% url 'component_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
